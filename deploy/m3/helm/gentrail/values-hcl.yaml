# Example values for the Gentrail-cloud k3s deploy. The real file is generated by
# OpenTofu (infra/k3s) from the data-stack outputs; this documents the shape.
# k3s has no IRSA, so irsa.* stay empty and pods use the node instance profile.

aws:
  region: us-west-2

createNamespace: false

image:
  registry: ghcr.io/aigentrail
  tag: v0.1.0

ddb:
  tablePrefix: aigentrail
  tableSuffix: "-dev"

s3:
  evidenceBucket: "" # aigentrail-evidence-dev-<account_id> (evidence stack output)

rds:
  bootstrap: false # OpenTofu creates gentrail-rds-secret from the RDS endpoint

nats:
  replicas: 1

policyEngine:
  replicaCount: 1

cloudflared:
  enabled: true
