# Defaults — all CFN-output-derived keys are left empty so a value injected
# by cfn-to-values.sh wins via -f override.

# Deployment substrate. The two targets differ only in how pods get AWS creds and
# who provisions the RDS secret, so they collapse to one profile rather than a set
# of independent flags:
#   k3s (our cloud): no pod-identity webhook, so the chart injects the IRSA token
#     directly; OpenTofu creates the RDS secret.
#   eks (customer BYOC): the managed webhook injects the token; an in-cluster Job
#     mints the RDS secret via IRSA.
# Both use IRSA (web-identity tokens), never the node role via IMDS.
mode: k3s

aws:
  region: ""

# Chart owns the namespace. Set false when the runner pre-creates it (so the
# license Secret and init-aws ConfigMap can land before install).
createNamespace: true

image:
  # Public ECR mirror so BYOC clients pull anonymously (no token). The internal
  # dev deploy overrides this to ghcr in infra/k3s-apps. images.yml mirrors every
  # release tag from ghcr to this registry.
  registry: public.ecr.aws/p6a2v1k1
  tag: v0.2.0-rc.10
  pullPolicy: IfNotPresent
  pullSecret: ""

ingress:
  host: ""     # dashboard FQDN (only needed when its ALB is internet-facing)
  otelHost: "" # OTLP ingest FQDN for the authproxy (otel.aigentrail.com)
  certArn: ""  # ACM cert for the public host(s); with it the ALB serves HTTPS, else HTTP
  # ALB scheme per endpoint, controlled independently. internal = reachable only
  # inside the VPC / over VPN (clients use the ALB DNS name); false =
  # internet-facing. Both default internal - the safe default, and what our own
  # cloud uses behind a tunnel. The free-tier install makes OTLP ingest public
  # (agents send telemetry without a tunnel) by setting otelInternal=false, while
  # the dashboard stays internal. TLS is driven by certArn independently of scheme.
  dashboardInternal: true
  otelInternal: true

# PVC storage class. "" uses the cluster default (k3s local-path); set gp2 on EKS.
storage:
  class: ""

ddb:
  tablePrefix: gentrail
  tableSuffix: "" # appended after the table name, e.g. "-dev" for gentrail-traces-dev
  endpoint: "" # "" = real AWS DynamoDB via IRSA; set to dynamodb-local for local mode

# Renders in-cluster DynamoDB-local + Postgres + table init so the chart runs
# end to end without AWS (set ddb.endpoint to dynamodb-local too). Never enable
# for a cloud install.
local:
  enabled: false
  # PVC sizes for the on-disk appliance datastores (StatefulSets). Only used when
  # local.enabled; on a cloud install the real DDB/RDS make these inert.
  dynamodbSize: 10Gi
  postgresSize: 10Gi
  tablesDir: "" # where init-aws.sh finds table specs; "" = /init (the flat ConfigMap mount)

# Default-deny + per-component allows. Disable for local clusters whose CNI
# enforces policies but where the prod 443/IRSA egress shape does not apply.
networkPolicies:
  enabled: true

s3:
  evidenceBucket: ""

rds:
  endpoint: ""
  secretArn: ""
  # The pre-install Job that mints gentrail-rds-secret runs only on eks (see
  # mode); on k3s OpenTofu creates the secret, and local mode supplies it.

# In-cluster Cloudflare Tunnel ingress (k3s): cloudflared connects out to
# Cloudflare and routes the configured hostnames to the in-cluster Services.
# Run >1 replica for edge HA. The tunnel's ingress rules are managed remotely.
cloudflared:
  enabled: false
  replicaCount: 2
  image: cloudflare/cloudflared:2024.10.0
  tokenSecretRef: gentrail-cloudflared

llm:
  provider: bedrock
  model: ""

irsa:
  dashboard: ""
  policyEngine: ""
  rdsBootstrap: ""
  evaluator: ""
  authproxy: ""
  docsServer: ""

license:
  secretRef: gentrail-license
  # Optional bootstrap JWT. When set, the pre-install hook seeds the license
  # secret once at install (hosted passes its Secrets Manager value here); when
  # empty the secret is created empty for the in-product upload to populate.
  jwt: ""

audit:
  pvcSize: 10Gi

dashboard:
  replicaCount: 2
  # Set false to run a read-only dashboard (no heartbeat/evidence writes) when
  # a second stack shares this RDS during an incremental cutover.
  auditLoop: true
  # true on a self-hosted (own-cloud) install: the scanner role lives in this
  # account, so AWS connect can suggest its ARN. false for the hosted SaaS.
  selfHosted: false
  # AWS-connect onboarding (the "connect your AWS account" flow). The hosted
  # stage sets these from its own domains + backend account; left empty the flow
  # has no callback URL, skips the forwarder deploy, and omits the cross-account
  # trust account from the CloudFormation template.
  awsAccountId: ""
  callbackUrl: ""
  ingestionEndpoint: ""
  # Absolute base for links in notification emails; empty falls back to relative.
  baseUrl: ""
  # Match the live env to share the session cookie (SSO across hosts, and
  # existing sessions survive a hostname cutover). Unset falls back to a
  # host-only cookie signed with the built-in "dev" secret.
  cookieDomain: ""
  sessionSecretName: ""   # k8s secret holding key "session-secret"
  # /admin/orgs tenant lifecycle; the routes register only when this token is set.
  adminTokenSecretName: ""   # k8s secret holding key "admin-token"
  # Relax X-Frame-Options from DENY to SAMEORIGIN so the marketing demo can embed
  # the dashboard in an iframe it proxies under the same origin. Demo stage only;
  # production leaves it false (unframeable).
  allowFraming: false
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

# policy-engine now speaks Bedrock (llm.provider/llm.model below; IRSA grants
# bedrock:InvokeModel). Enable it by setting replicaCount: 1 once the configured
# model is granted access in the account/region - the substrate's validator
# checks availability, but Bedrock model access is a separate console opt-in.
# The dashboard works without it; AI policy extraction is the only feature it
# powers.
policyEngine:
  replicaCount: 0
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 1Gi }

# replicas sets both the NATS cluster size and the EVENTS stream replica factor.
# 1 for a single-node env, 3 for the HA BYOC cluster.
nats:
  replicas: 1
  jetstreamSize: 5Gi
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

evaluator:
  replicaCount: 1
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 350Mi }

authproxy:
  replicaCount: 1
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 350Mi }

# The interactive-demo sidecar (gentrail.ai/demo): leases per-visitor pool orgs
# and replays a case's recorded trace cassette through ingestion. Demo stage only
# (enabled false everywhere else). Cassettes are baked into the image at /cases.
# Needs the same admin token the dashboard guards /admin/orgs with, so the pool
# can mint + reset orgs; pair with dashboard.allowFraming: true.
sidecar:
  enabled: false
  replicaCount: 1
  buffer: 3
  adminTokenSecretName: ""   # k8s secret holding key "admin-token" (reuse the dashboard's)
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 250m, memory: 256Mi }

# docs-server (the internal wiki). Our-cloud-only: enabled false so a BYOC install
# never renders it (like cloudflared/local). infra/k3s-apps enables it, supplies
# the binaries bucket, and routes the wiki hostname to it on the k3s tunnel. It
# shares the dashboard's session cookie (dashboard.sessionSecretName +
# dashboard.cookieDomain) so a dashboard login authenticates the wiki.
docsServer:
  enabled: false
  # Binaries bucket holding the docs tarball + the live-edit write-through prefix.
  # At boot the server extracts docsTarballKey, then reads/writes edits under
  # editsS3Prefix. IRSA (irsa.docsServer) scopes the access.
  editsS3Bucket: ""
  editsS3Prefix: "intranet-docs/data/"
  docsTarballKey: "intranet-docs/docs.tar.gz"
  # Session cookie Domain for the wiki. Empty inherits dashboard.cookieDomain
  # (same parent domain). Set explicitly when the wiki lives on a different
  # parent (e.g. ".gentrail.ai" while the dashboard is on aigentrail.com).
  cookieDomain: ""
  # In-cluster dashboard URL the wiki's login form bridges to (shared auth API).
  dashboardInternalUrl: "http://dashboard:8001"
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 250m, memory: 150Mi }
