{{- if .Values.cloudflared.enabled }}
# Cloudflare Tunnel ingress: cloudflared dials out to Cloudflare (no public
# inbound) and routes the tunnel's configured hostnames to the in-cluster
# Services. Routing rules are managed remotely (OpenTofu's Cloudflare provider);
# this only needs the tunnel token. Run >1 replica for edge HA.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "gentrail.labels" (merge (dict "component" "cloudflared") .) | indent 4 }}
spec:
  replicas: {{ .Values.cloudflared.replicaCount }}
  selector:
    matchLabels:
{{ include "gentrail.selectorLabels" (merge (dict "component" "cloudflared") .) | indent 6 }}
  template:
    metadata:
      labels:
{{ include "gentrail.selectorLabels" (merge (dict "component" "cloudflared") .) | indent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: { type: RuntimeDefault }
{{ include "gentrail.imagePullSecrets" . | indent 6 }}
      containers:
        - name: cloudflared
          image: {{ .Values.cloudflared.image }}
          args: ["tunnel", "--no-autoupdate", "--metrics", "0.0.0.0:2000", "run"]
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cloudflared.tokenSecretRef }}
                  key: token
          livenessProbe:
            httpGet: { path: /ready, port: 2000 }
            initialDelaySeconds: 10
            periodSeconds: 10
{{- end }}
