apiVersion: apps/v1
kind: Deployment
metadata:
  name: authproxy
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "gentrail.labels" (merge (dict "component" "authproxy") .) | indent 4 }}
spec:
  replicas: {{ .Values.authproxy.replicaCount }}
  selector:
    matchLabels:
{{ include "gentrail.selectorLabels" (merge (dict "component" "authproxy") .) | indent 6 }}
  template:
    metadata:
      labels:
{{ include "gentrail.selectorLabels" (merge (dict "component" "authproxy") .) | indent 8 }}
    spec:
      serviceAccountName: authproxy
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
{{ include "gentrail.imagePullSecrets" . | indent 6 }}
      containers:
        - name: authproxy
          image: {{ include "gentrail.image" (merge (dict "component" "authproxy") .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: otlp
              containerPort: 4318
          env:
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
            - name: PORT
              value: "4318"
            - name: EVENT_BUS
              value: nats
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: NATS_STREAM_REPLICAS
              value: {{ .Values.nats.replicas | quote }}
            - name: DYNAMO_TRACES_TABLE
              value: "{{ .Values.ddb.tablePrefix }}-traces{{ .Values.ddb.tableSuffix }}"
            - name: DYNAMO_AGENT_STATS_TABLE
              value: "{{ .Values.ddb.tablePrefix }}-agent-stats{{ .Values.ddb.tableSuffix }}"
            - name: DYNAMO_API_KEYS_TABLE
              value: "{{ .Values.ddb.tablePrefix }}-api-keys{{ .Values.ddb.tableSuffix }}"
{{- include "gentrail.licenseEnv" . | nindent 12 }}
{{- include "gentrail.localEnv" . | nindent 12 }}
            {{- if and .Values.irsa.authproxy .Values.aws.irsaInjectToken }}
{{- include "gentrail.irsaEnv" .Values.irsa.authproxy | nindent 12 }}
            {{- end }}
          resources: {{- toYaml .Values.authproxy.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /healthz, port: otlp }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: otlp }
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
{{- include "gentrail.licenseMount" . | nindent 12 }}
          {{- if and .Values.irsa.authproxy .Values.aws.irsaInjectToken }}
{{- include "gentrail.irsaTokenMount" . | nindent 12 }}
          {{- end }}
      volumes:
{{- include "gentrail.licenseVolume" . | nindent 8 }}
          {{- if and .Values.irsa.authproxy .Values.aws.irsaInjectToken }}
{{- include "gentrail.irsaTokenVolume" . | nindent 8 }}
          {{- end }}
