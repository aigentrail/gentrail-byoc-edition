{{- if .Values.networkPolicies.enabled }}
# Default-deny: nothing crosses pod boundaries unless an explicit allow rule
# matches. Single-tenant cluster, but this enforces blast-radius limits.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: {{ .Release.Namespace }}
spec:
  podSelector: {}
  policyTypes: [ Ingress, Egress ]
---
# Allow dashboard to reach Postgres, policy-engine, NATS, DNS, and AWS APIs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dashboard-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: dashboard
  policyTypes: [ Egress ]
  egress:
    - to: []
      ports:
        - { protocol: TCP, port: 443 }
        - { protocol: TCP, port: 5432 }
        - { protocol: TCP, port: 8100 }
        - { protocol: TCP, port: 4222 }
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: policy-engine-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: policy-engine
  policyTypes: [ Egress ]
  egress:
    - to: []
      ports:
        - { protocol: TCP, port: 443 }
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# Allow ALB → backend pods on 8001 / 4318 / 8100.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alb-to-services
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchExpressions:
      - { key: app.kubernetes.io/component, operator: In, values: [ dashboard, policy-engine, authproxy ] }
  policyTypes: [ Ingress ]
  ingress:
    - ports:
        - { protocol: TCP, port: 8001 }
        - { protocol: TCP, port: 4318 }
        - { protocol: TCP, port: 8100 }
---
# Allow kubelet readiness/liveness probes to the evaluator health port (the
# other services' probe ports are covered by alb-to-services).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: evaluator-health
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: evaluator
  policyTypes: [ Ingress ]
  ingress:
    - ports:
        - { protocol: TCP, port: 8080 }
---
# evaluator + authproxy reach NATS (4222), AWS DDB (443), and DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bus-clients-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchExpressions:
      - { key: app.kubernetes.io/component, operator: In, values: [ evaluator, authproxy ] }
  policyTypes: [ Egress ]
  egress:
    - to: []
      ports:
        - { protocol: TCP, port: 443 }
        - { protocol: TCP, port: 4222 }
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
{{- if .Values.aws.imdsEgress }}
---
# Pods assume the node IAM role via IMDS (when not using IRSA). The link-local
# metadata endpoint is port 80, which the :443 AWS-API allow above does not
# cover, so the AWS-calling components need an explicit allow or they can't
# fetch credentials at all.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: imds-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchExpressions:
      - { key: app.kubernetes.io/component, operator: In, values: [ dashboard, authproxy, evaluator, policy-engine ] }
  policyTypes: [ Egress ]
  egress:
    - to:
        - ipBlock: { cidr: 169.254.169.254/32 }
      ports:
        - { protocol: TCP, port: 80 }
{{- end }}
---
# NATS accepts client connections (4222) and peer clustering (6222).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nats-ingress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: nats
  policyTypes: [ Ingress ]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - { key: app.kubernetes.io/component, operator: In, values: [ dashboard, evaluator, authproxy, nats ] }
      ports:
        - { protocol: TCP, port: 4222 }
        - { protocol: TCP, port: 6222 }
---
# NATS reaches its peers for clustering (6222) and DNS to resolve them.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nats-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: nats
  policyTypes: [ Egress ]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: nats
      ports:
        - { protocol: TCP, port: 6222 }
    - to: []
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
{{- if .Values.cloudflared.enabled }}
---
# cloudflared reaches Cloudflare's edge (443) and the in-cluster Services.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudflared-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: cloudflared
  policyTypes: [ Egress ]
  egress:
    - to: []
      ports:
        - { protocol: TCP, port: 443 }
        # Tunnel edge data-plane: QUIC (UDP) preferred, http2 (TCP) fallback.
        - { protocol: UDP, port: 7844 }
        - { protocol: TCP, port: 7844 }
        - { protocol: TCP, port: 8001 }
        - { protocol: TCP, port: 4318 }
        - { protocol: TCP, port: 8100 }
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# kubelet liveness probe to the cloudflared metrics port.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudflared-health
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: cloudflared
  policyTypes: [ Ingress ]
  ingress:
    - ports:
        - { protocol: TCP, port: 2000 }
{{- end }}
{{- end }}
