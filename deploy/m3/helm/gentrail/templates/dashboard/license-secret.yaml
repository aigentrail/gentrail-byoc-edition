# Provision the license secret, seeded from license.jwt when set (hosted passes
# its Secrets Manager value) or empty otherwise for the in-product upload to
# populate (license-rbac.yaml grants get+patch on this one name). This is the
# single owner of the secret for every deployment shape; hosted no longer manages
# it from OpenTofu.
#
# pre-install only: created once at install. helm upgrades never touch a hook
# resource, so the seed is a one-time bootstrap and a license later pasted in the
# dashboard survives upgrades.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.license.secretRef }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  jwt: {{ .Values.license.jwt | default "" | quote }}
