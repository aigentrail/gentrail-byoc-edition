# Auto-provision the license secret (empty) so the dashboard can mount it and
# the in-product upload can populate it (license-rbac.yaml grants get+patch on
# this one name). No manual secret step: the operator pastes the license in the
# dashboard, which patches this secret and every service hot-reloads.
#
# pre-install only: created once at install. helm upgrades never touch a hook
# resource, so a license pasted in the dashboard survives upgrades.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.license.secretRef }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  jwt: ""
