apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "gentrail.labels" (merge (dict "component" "dashboard") .) | indent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
{{ include "gentrail.selectorLabels" (merge (dict "component" "dashboard") .) | indent 6 }}
  template:
    metadata:
      labels:
{{ include "gentrail.selectorLabels" (merge (dict "component" "dashboard") .) | indent 8 }}
    spec:
      serviceAccountName: dashboard
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
{{ include "gentrail.imagePullSecrets" . | indent 6 }}
      containers:
        - name: dashboard
          image: {{ include "gentrail.image" (merge (dict "component" "dashboard") .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8001
          env:
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
            - name: DYNAMO_TRACES_TABLE
              value: "{{ .Values.ddb.tablePrefix }}-traces{{ .Values.ddb.tableSuffix }}"
            - name: DYNAMO_VIOLATIONS_TABLE
              value: "{{ .Values.ddb.tablePrefix }}-violations{{ .Values.ddb.tableSuffix }}"
            - name: DYNAMO_AGENT_STATS_TABLE
              value: "{{ .Values.ddb.tablePrefix }}-agent-stats{{ .Values.ddb.tableSuffix }}"
            - name: DYNAMO_POLICY_RULES_TABLE
              value: "{{ .Values.ddb.tablePrefix }}-policy-rules{{ .Values.ddb.tableSuffix }}"
            - name: DYNAMO_API_KEYS_TABLE
              value: "{{ .Values.ddb.tablePrefix }}-api-keys{{ .Values.ddb.tableSuffix }}"
            - name: EVIDENCE_BUCKET
              value: {{ .Values.s3.evidenceBucket | quote }}
            - name: EVIDENCE_BUCKET_REGION
              value: {{ .Values.aws.region | quote }}
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: NATS_STREAM_REPLICAS
              value: {{ .Values.nats.replicas | quote }}
            - name: POLICY_ENGINE_URL
              value: "http://policy-engine:8100"
            - name: AUDIT_LOOP_ENABLED
              value: {{ .Values.dashboard.auditLoop | quote }}
            - name: AIGENTRAIL_SELF_HOSTED
              value: {{ .Values.dashboard.selfHosted | quote }}
            {{- if .Values.dashboard.awsAccountId }}
            - name: AIGENTRAIL_AWS_ACCOUNT_ID
              value: {{ .Values.dashboard.awsAccountId | quote }}
            {{- end }}
            {{- if .Values.dashboard.callbackUrl }}
            - name: AIGENTRAIL_CALLBACK_URL
              value: {{ .Values.dashboard.callbackUrl | quote }}
            {{- end }}
            {{- if .Values.dashboard.ingestionEndpoint }}
            - name: AIGENTRAIL_INGESTION_ENDPOINT
              value: {{ .Values.dashboard.ingestionEndpoint | quote }}
            {{- end }}
            {{- if .Values.dashboard.baseUrl }}
            - name: AIGENTRAIL_DASHBOARD_BASE_URL
              value: {{ .Values.dashboard.baseUrl | quote }}
            {{- end }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gentrail-rds-secret
                  key: dsn
{{- include "gentrail.licenseEnv" . | nindent 12 }}
            - name: LICENSE_SECRET_NAME
              value: {{ .Values.license.secretRef | quote }}
            {{- if .Values.dashboard.cookieDomain }}
            - name: AIGENTRAIL_COOKIE_DOMAIN
              value: {{ .Values.dashboard.cookieDomain | quote }}
            {{- end }}
            {{- if .Values.dashboard.sessionSecretName }}
            - name: AIGENTRAIL_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dashboard.sessionSecretName }}
                  key: session-secret
            {{- end }}
            {{- if .Values.dashboard.adminTokenSecretName }}
            - name: ADMIN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dashboard.adminTokenSecretName }}
                  key: admin-token
            {{- end }}
            {{- if .Values.dashboard.allowFraming }}
            - name: DASHBOARD_ALLOW_FRAMING
              value: "true"
            {{- end }}
{{- include "gentrail.localEnv" . | nindent 12 }}
            {{- if and .Values.irsa.dashboard (eq .Values.mode "k3s") }}
{{- include "gentrail.irsaEnv" .Values.irsa.dashboard | nindent 12 }}
            {{- end }}
          resources: {{- toYaml .Values.dashboard.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: audit-buffer
              mountPath: /var/lib/gentrail/audit
{{- include "gentrail.licenseMount" . | nindent 12 }}
            {{- if and .Values.irsa.dashboard (eq .Values.mode "k3s") }}
{{- include "gentrail.irsaTokenMount" . | nindent 12 }}
            {{- end }}
      volumes:
{{- include "gentrail.licenseVolume" . | nindent 8 }}
        - name: audit-buffer
          persistentVolumeClaim:
            claimName: dashboard-audit-buffer
        {{- if and .Values.irsa.dashboard (eq .Values.mode "k3s") }}
{{- include "gentrail.irsaTokenVolume" . | nindent 8 }}
        {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dashboard-audit-buffer
  namespace: {{ .Release.Namespace }}
spec:
  {{- if .Values.storage.class }}
  storageClassName: {{ .Values.storage.class | quote }}
  {{- end }}
  accessModes: [ ReadWriteOnce ]
  resources:
    requests:
      storage: {{ .Values.audit.pvcSize | quote }}
