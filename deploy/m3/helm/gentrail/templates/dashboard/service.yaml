apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "gentrail.labels" (merge (dict "component" "dashboard") .) | indent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: http
      name: http
  selector:
{{ include "gentrail.selectorLabels" (merge (dict "component" "dashboard") .) | indent 4 }}
