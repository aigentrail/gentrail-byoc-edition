{{- if and .Values.rds.bootstrap (not .Values.local.enabled) }}
# One-shot Job that reads the RDS master password from Secrets Manager (using
# the `dashboard` SA's IRSA permissions) and writes a K8s Secret named
# gentrail-rds-secret with key `dsn` shaped for Go's database/sql DATABASE_URL.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rds-secret-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.irsa.rdsBootstrap | quote }}
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rds-secret-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rds-secret-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rds-secret-bootstrap
subjects:
  - kind: ServiceAccount
    name: rds-secret-bootstrap
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rds-secret-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      serviceAccountName: rds-secret-bootstrap
      restartPolicy: Never
      containers:
        - name: bootstrap
          image: amazon/aws-cli:2.17.0
          env:
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
            - name: RDS_SECRET_ARN
              value: {{ .Values.rds.secretArn | quote }}
            - name: RDS_ENDPOINT
              value: {{ .Values.rds.endpoint | quote }}
            - name: NS
              value: {{ .Release.Namespace | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              PASSWORD=$(aws secretsmanager get-secret-value --secret-id "$RDS_SECRET_ARN" \
                --query SecretString --output text | sed 's/.*"password":"//;s/".*//')
              HOST="${RDS_ENDPOINT%:*}"
              PORT="${RDS_ENDPOINT##*:}"
              DSN="postgres://gentrail:${PASSWORD}@${HOST}:${PORT}/gentrail?sslmode=require"
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              cat > /tmp/secret.json <<JSON
              {"apiVersion":"v1","kind":"Secret","metadata":{"name":"gentrail-rds-secret","namespace":"${NS}"},"type":"Opaque","stringData":{"dsn":"${DSN}"}}
              JSON
              curl -sS --cacert "$CA" -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -X POST "https://kubernetes.default/api/v1/namespaces/${NS}/secrets" \
                --data @/tmp/secret.json -o /tmp/resp.json && \
                echo "secret created" || (
                  curl -sS --cacert "$CA" -H "Authorization: Bearer $TOKEN" \
                    -H "Content-Type: application/strategic-merge-patch+json" \
                    -X PATCH "https://kubernetes.default/api/v1/namespaces/${NS}/secrets/gentrail-rds-secret" \
                    --data @/tmp/secret.json && echo "secret patched"
                )
{{- end }}
