name: gentrail-m3-local

services:

  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 2s
      retries: 20

  dynamodb-local:
    image: docker.io/amazon/dynamodb-local:2.5.2
    command: -jar DynamoDBLocal.jar -sharedDb -inMemory
    ports:
      - "8000:8000"

  nats:
    image: docker.io/library/nats:2.10-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 2s
      retries: 20

  init-aws:
    image: docker.io/amazon/aws-cli:2.17.0
    depends_on:
      dynamodb-local: { condition: service_started }
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      DDB_ENDPOINT: http://dynamodb-local:8000
    entrypoint: ["/bin/sh", "/init/init-aws.sh"]
    volumes:
      - ./init:/init:ro
    restart: "no"

  dashboard:
    image: gentrail/dashboard:dev
    depends_on:
      postgres: { condition: service_healthy }
      init-aws: { condition: service_completed_successfully }
      nats: { condition: service_healthy }
    environment:
      NATS_URL: nats://nats:4222
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_ENDPOINT_URL_DYNAMODB: http://dynamodb-local:8000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      DYNAMO_TRACES_TABLE: gentrail-traces
      DYNAMO_VIOLATIONS_TABLE: gentrail-violations
      DYNAMO_AGENT_STATS_TABLE: gentrail-agent-stats
      DYNAMO_POLICY_RULES_TABLE: gentrail-policy-rules
      DYNAMO_API_KEYS_TABLE: gentrail-api-keys
      LICENSE_JWT: ${LICENSE_JWT}
    ports:
      - "8001:8001"

  policy-engine:
    image: gentrail/policy-engine:dev
    environment:
      LICENSE_JWT: ${LICENSE_JWT}
    ports:
      - "8100:8100"

  evaluator:
    image: gentrail/evaluator:dev
    depends_on:
      init-aws: { condition: service_completed_successfully }
      nats: { condition: service_healthy }
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_ENDPOINT_URL_DYNAMODB: http://dynamodb-local:8000
      DYNAMO_TRACES_TABLE: gentrail-traces
      DYNAMO_VIOLATIONS_TABLE: gentrail-violations
      DYNAMO_AGENT_STATS_TABLE: gentrail-agent-stats
      DYNAMO_POLICY_RULES_TABLE: gentrail-policy-rules
      EVENT_BUS: nats
      NATS_URL: nats://nats:4222
      LICENSE_JWT: ${LICENSE_JWT}

  # OTLP ingest. In the cloud this is a Lambda Function URL publishing to SNS;
  # here it is a long-running HTTP server (EVENT_BUS=nats) publishing
  # trace.ingested to JetStream, completing the local ingest -> eval path.
  authproxy:
    image: gentrail/authproxy:dev
    depends_on:
      init-aws: { condition: service_completed_successfully }
      nats: { condition: service_healthy }
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_ENDPOINT_URL_DYNAMODB: http://dynamodb-local:8000
      DYNAMO_TRACES_TABLE: gentrail-traces
      DYNAMO_AGENT_STATS_TABLE: gentrail-agent-stats
      DYNAMO_API_KEYS_TABLE: gentrail-api-keys
      EVENT_BUS: nats
      NATS_URL: nats://nats:4222
      PORT: "4318"
      LICENSE_JWT: ${LICENSE_JWT}
    ports:
      - "4318:4318"

volumes:
  nats-data:

