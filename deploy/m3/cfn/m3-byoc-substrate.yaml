  # <<< GENERATED ddb-tables

  # ── S3 buckets ────────────────────────────────────────────────────
  EvidenceBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${ClusterName}-evidence-${AWS::AccountId}-${AWS::Region}"
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            Mode: GOVERNANCE
            Days: !Ref S3ObjectLockRetentionDays
      VersioningConfiguration: { Status: Enabled }
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !If [ CreateKmsKey, !GetAtt SubstrateKmsKey.Arn, !Ref ExistingKmsKeyArn ]
      Tags:
        - { Key: gentrail:role, Value: evidence }

  TraceArchiveBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${ClusterName}-trace-archive-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !If [ CreateKmsKey, !GetAtt SubstrateKmsKey.Arn, !Ref ExistingKmsKeyArn ]
      # Same tiering as infra/ingestion's trace archive: warm for 90 days,
      # GLACIER_IR to one year, DEEP_ARCHIVE beyond.
      LifecycleConfiguration:
        Rules:
          - Id: archive-lifecycle
            Status: Enabled
            Transitions:
              - { TransitionInDays: 90,  StorageClass: GLACIER_IR }
              - { TransitionInDays: 365, StorageClass: DEEP_ARCHIVE }
      Tags:
        - { Key: gentrail:role, Value: trace-archive }

  AlbLogsBucket:
    Condition: EnableAlbAccessLogsCond
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${ClusterName}-alb-logs-${AWS::AccountId}-${AWS::Region}"
      VersioningConfiguration: { Status: Enabled }
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        # ALB access-log delivery only accepts AES256, NOT SSE-KMS.
        # Keep this bucket on AES256; protection is bucket-policy + BPA.
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      Tags:
        - { Key: gentrail:role, Value: alb-logs }
  AlbLogsBucketPolicy:
    Condition: EnableAlbAccessLogsCond
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AlbLogsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowELBLogDelivery
            Effect: Allow
            Principal:
              # ELB account ID per region. us-west-2 = 797873946194.
              # For multi-region support, add a Mappings table by region.
              AWS: !Sub "arn:aws:iam::797873946194:root"
            Action: s3:PutObject
            Resource: !Sub "${AlbLogsBucket.Arn}/AWSLogs/${AWS::AccountId}/*"

  VpcFlowLogsBucket:
    Condition: EnableVpcFlowLogsCond
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${ClusterName}-vpc-flow-logs-${AWS::AccountId}-${AWS::Region}"
      VersioningConfiguration: { Status: Enabled }
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !If [ CreateKmsKey, !GetAtt SubstrateKmsKey.Arn, !Ref ExistingKmsKeyArn ]
      Tags:
        - { Key: gentrail:role, Value: vpc-flow-logs }

  # ── RDS Postgres ─────────────────────────────────────────────────
  RdsSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "${ClusterName} RDS subnet group"
      SubnetIds:
        - !Ref PrivateSubnet0
        - !Ref PrivateSubnet1
        - !If [ ThreeOrMoreAzs, !Ref PrivateSubnet2, !Ref AWS::NoValue ]

  RdsInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "${ClusterName}-rds"
      Engine: postgres
      # Major-version only: RDS selects the latest supported 16.x at create time.
      # Pinning a minor rots (AWS deprecates old minors and CreateDBInstance 400s).
      EngineVersion: "16"
      DBInstanceClass: !Ref RdsInstanceClass
      AllocatedStorage: !Ref RdsAllocatedStorageGb
      StorageEncrypted: true
      KmsKeyId: !If [ CreateKmsKey, !GetAtt SubstrateKmsKey.Arn, !Ref ExistingKmsKeyArn ]
      MasterUsername: gentrail
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${RdsMasterSecret}:SecretString:password}}"
      DBName: gentrail
      DBSubnetGroupName: !Ref RdsSubnetGroup
      VPCSecurityGroups: [ !Ref RdsSecurityGroup ]
      MultiAZ: !Ref RdsMultiAz
      BackupRetentionPeriod: !Ref RdsBackupRetentionDays
      EnableCloudwatchLogsExports: !Ref RdsEnabledCloudwatchLogsExports
      PubliclyAccessible: false
      AutoMinorVersionUpgrade: true
      DeletionProtection: !Ref RdsDeletionProtection
      EnablePerformanceInsights: !Ref EnableRdsPerformanceInsights
      PerformanceInsightsKMSKeyId: !If
        - EnableRdsPerformanceInsightsCond
        - !If [ CreateKmsKey, !GetAtt SubstrateKmsKey.Arn, !Ref ExistingKmsKeyArn ]
        - !Ref AWS::NoValue
      Tags:
        - { Key: gentrail:role, Value: rds-postgres }

  # ── EKS cluster ──────────────────────────────────────────────────
  EksClusterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: eks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy

  EksCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Ref ClusterName
      Version: !Ref EksVersion
      RoleArn: !GetAtt EksClusterRole.Arn
      ResourcesVpcConfig:
        SubnetIds:
          - !Ref PrivateSubnet0
          - !Ref PrivateSubnet1
          - !If [ ThreeOrMoreAzs, !Ref PrivateSubnet2, !Ref AWS::NoValue ]
          - !Ref PublicSubnet0
          - !Ref PublicSubnet1
          - !If [ ThreeOrMoreAzs, !Ref PublicSubnet2, !Ref AWS::NoValue ]
        EndpointPublicAccess: true
        EndpointPrivateAccess: true
        PublicAccessCidrs: [ !Ref AllowedIngressCidr ]
      Logging:
        ClusterLogging:
          EnabledTypes:
            - { Type: api }
            - { Type: audit }
            - { Type: authenticator }
            - { Type: controllerManager }
            - { Type: scheduler }
      EncryptionConfig:
        - Resources: [ secrets ]
          Provider:
            KeyArn: !If [ CreateKmsKey, !GetAtt SubstrateKmsKey.Arn, !Ref ExistingKmsKeyArn ]
      Tags:
        - { Key: gentrail:role, Value: eks-cluster }

  # OIDC provider for IRSA
  EksOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: !GetAtt EksCluster.OpenIdConnectIssuerUrl
      ClientIdList: [ "sts.amazonaws.com" ]
      ThumbprintList:
        # AWS-published EKS OIDC thumbprint; rotates very rarely.
        # Refresh from EKS docs if IRSA breaks.
        - "9e99a48a9960b14926bb7f3b02e22da2b0ab7280"

  # ── Managed node group ───────────────────────────────────────────
  NodeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly

  NodeLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${ClusterName}-node-lt"
      LaunchTemplateData:
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 50
              VolumeType: gp3
              Encrypted: true
              KmsKeyId: !If [ CreateKmsKey, !GetAtt SubstrateKmsKey.Arn, !Ref ExistingKmsKeyArn ]
              DeleteOnTermination: true
        MetadataOptions:
          HttpTokens: required
          HttpPutResponseHopLimit: 2
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - { Key: Name, Value: !Sub "${ClusterName}-node" }

  NodeGroup:
    Type: AWS::EKS::Nodegroup
    Properties:
      ClusterName: !Ref EksCluster
      NodeRole: !GetAtt NodeRole.Arn
      ScalingConfig:
        MinSize: !Ref NodeCountMin
        DesiredSize: !Ref NodeCountDesired
        MaxSize: !Ref NodeCountMax
      InstanceTypes: [ !Ref NodeInstanceType ]
      Subnets:
        - !Ref PrivateSubnet0
        - !Ref PrivateSubnet1
        - !If [ ThreeOrMoreAzs, !Ref PrivateSubnet2, !Ref AWS::NoValue ]
      LaunchTemplate:
        Id: !Ref NodeLaunchTemplate
        Version: !GetAtt NodeLaunchTemplate.LatestVersionNumber
      Labels:
        gentrail.io/role: workload
      Tags:
        gentrail:role: eks-node

  # ── EBS CSI driver addon (required for PersistentVolumeClaims) ───
  # Without this addon, every PVC stays Pending and any pod with a
  # PVC won't schedule. Default-EKS doesn't include it.
  EbsCsiIrsaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument: !Sub
        - |
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": { "Federated": "${OidcArn}" },
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "${OidcUrl}:sub": "system:serviceaccount:kube-system:ebs-csi-controller-sa",
                  "${OidcUrl}:aud": "sts.amazonaws.com"
                }
              }
            }]
          }
        - OidcArn: !GetAtt EksOidcProvider.Arn
          OidcUrl: !Select [1, !Split ["//", !GetAtt EksCluster.OpenIdConnectIssuerUrl]]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy
      Tags:
        - { Key: gentrail:service-account, Value: ebs-csi-controller-sa }

  EbsCsiAddon:
    Type: AWS::EKS::Addon
    DependsOn: NodeGroup
    Properties:
      ClusterName: !Ref EksCluster
      AddonName: aws-ebs-csi-driver
      ServiceAccountRoleArn: !GetAtt EbsCsiIrsaRole.Arn
      ResolveConflicts: OVERWRITE

  # ── IRSA: one role per service ───────────────────────────────────
  DashboardIrsaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument: !Sub
        - |
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": { "Federated": "${OidcArn}" },
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "${OidcUrl}:sub": "system:serviceaccount:gentrail:dashboard",
                  "${OidcUrl}:aud": "sts.amazonaws.com"
                }
              }
            }]
          }
        - OidcArn: !GetAtt EksOidcProvider.Arn
          OidcUrl: !Select [1, !Split ["//", !GetAtt EksCluster.OpenIdConnectIssuerUrl]]
      Policies:
        - PolicyName: dashboard-data-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DdbReadWrite
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt TracesTable.Arn
                  - !Sub "${TracesTable.Arn}/index/*"
                  - !GetAtt ViolationsTable.Arn
                  - !Sub "${ViolationsTable.Arn}/index/*"
                  - !GetAtt AgentStatsTable.Arn
                  - !Sub "${AgentStatsTable.Arn}/index/*"
                  - !GetAtt PolicyRulesTable.Arn
                  - !GetAtt ApiKeysTable.Arn
              - Sid: EvidenceS3
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  # Object-lock retention is how evidence is WORM-locked at upload
                  # and extended; without it a BYOC install cannot lock evidence.
                  # DeleteObject is intentionally absent: the bucket is governance
                  # object-locked and the app never deletes evidence.
                  - s3:PutObjectRetention
                Resource: !Sub "${EvidenceBucket.Arn}/*"
              - Sid: EvidenceBucketList
                Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt EvidenceBucket.Arn
              - Sid: KmsDecrypt
                Effect: Allow
                Action: kms:Decrypt
                Resource: !If [ CreateKmsKey, !GetAtt SubstrateKmsKey.Arn, !Ref ExistingKmsKeyArn ]
              - Sid: RdsSecret
                Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref RdsMasterSecret
              # The cloud-scanner assumes GentrailReadOnlyRole to enumerate
              # Bedrock agents + run compliance checks against this account
              # (own-account scan, free tier). Referenced by constructed name,
              # not !GetAtt: the scanner role trusts this dashboard role, so a
              # !GetAtt back to it would be a circular dependency.
              - Sid: AssumeScannerRole
                Effect: Allow
                Action: sts:AssumeRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/gentrail-readonly-${AWS::Region}"
              # The dashboard's tool classifier invokes Amazon Nova (a first-party
              # model, so no per-account model-access grant is needed) on the
              # cross-region inference profile and the foundation model behind it.
              - Sid: BedrockClassify
                Effect: Allow
                Action: bedrock:InvokeModel
                Resource:
                  - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/us.amazon.nova-lite-v1:0"
                  - "arn:aws:bedrock:*::foundation-model/amazon.nova-lite-v1:0"
      Tags:
        - { Key: gentrail:service-account, Value: dashboard }

  PolicyEngineIrsaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument: !Sub
        - |
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": { "Federated": "${OidcArn}" },
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "${OidcUrl}:sub": "system:serviceaccount:gentrail:policy-engine",
                  "${OidcUrl}:aud": "sts.amazonaws.com"
                }
              }
            }]
          }
        - OidcArn: !GetAtt EksOidcProvider.Arn
          OidcUrl: !Select [1, !Split ["//", !GetAtt EksCluster.OpenIdConnectIssuerUrl]]
      Policies:
        - PolicyName: policy-engine-bedrock
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # A cross-region inference profile needs InvokeModel on both the
              # profile and the foundation models it routes to (region wildcard
              # covers every region the profile spans).
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${BedrockModelId}"
                  - !Sub "arn:aws:bedrock:*::foundation-model/${BedrockFoundationModelId}"
      Tags:
        - { Key: gentrail:service-account, Value: policy-engine }

  # ── ALB Controller IRSA role ────────────────────────────────────
  AlbControllerIrsaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument: !Sub
        - |
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": { "Federated": "${OidcArn}" },
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "${OidcUrl}:sub": "system:serviceaccount:kube-system:aws-load-balancer-controller",
                  "${OidcUrl}:aud": "sts.amazonaws.com"
                }
              }
            }]
          }
        - OidcArn: !GetAtt EksOidcProvider.Arn
          OidcUrl: !Select [1, !Split ["//", !GetAtt EksCluster.OpenIdConnectIssuerUrl]]
      # Inline policy attached at install time by deploy/m3/scripts/install-alb-controller.sh
      # (downloads the latest upstream IAM policy from kubernetes-sigs/aws-load-balancer-controller).
      Tags:
        - { Key: gentrail:service-account, Value: aws-load-balancer-controller }

  # ── Cross-account trust role (vendor compliance scanners) ────────
  # Used by the dashboard's awsclient scanner suite to read compliance
  # posture in this account. Gated by ExternalId. Read-only (no write
  # actions anywhere). Surfaced as the GentrailReadOnlyRoleArn output —
  # email that + your ExternalId to the Gentrail vendor.
  GentrailReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "gentrail-readonly-${AWS::Region}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          # Own-account scan (free tier): the in-account dashboard assumes this
          # to read the local account. The principal is a specific same-account
          # role, so no external ID is needed for confused-deputy protection.
          - Effect: Allow
            Principal:
              AWS: !GetAtt DashboardIrsaRole.Arn
            Action: sts:AssumeRole
          # Cross-account vendor scan (paid): only when an ExternalId is set.
          - !If
            - EnableScanner
            - Effect: Allow
              Principal:
                AWS: !Sub "arn:aws:iam::${VendorAccountId}:root"
              Action: sts:AssumeRole
              Condition:
                StringEquals:
                  sts:ExternalId: !Ref ExternalId
            - !Ref "AWS::NoValue"
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
        - arn:aws:iam::aws:policy/SecurityAudit
      Tags:
        - { Key: gentrail:scope, Value: trust-role }

  # ── RDS Secret Bootstrap IRSA role (for the helm pre-install hook) ───
  RdsBootstrapIrsaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument: !Sub
        - |
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": { "Federated": "${OidcArn}" },
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "${OidcUrl}:sub": "system:serviceaccount:gentrail:rds-secret-bootstrap",
                  "${OidcUrl}:aud": "sts.amazonaws.com"
                }
              }
            }]
          }
        - OidcArn: !GetAtt EksOidcProvider.Arn
          OidcUrl: !Select [1, !Split ["//", !GetAtt EksCluster.OpenIdConnectIssuerUrl]]
      Policies:
        - PolicyName: rds-bootstrap-data-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref RdsMasterSecret
              - Effect: Allow
                Action: kms:Decrypt
                Resource: !If [ CreateKmsKey, !GetAtt SubstrateKmsKey.Arn, !Ref ExistingKmsKeyArn ]
      Tags:
        - { Key: gentrail:service-account, Value: rds-secret-bootstrap }

  # ── Evaluator IRSA role (k8s consumer, replaces the evaluator Lambda) ──
  EvaluatorIrsaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument: !Sub
        - |
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": { "Federated": "${OidcArn}" },
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "${OidcUrl}:sub": "system:serviceaccount:gentrail:evaluator",
                  "${OidcUrl}:aud": "sts.amazonaws.com"
                }
              }
            }]
          }
        - OidcArn: !GetAtt EksOidcProvider.Arn
          OidcUrl: !Select [1, !Split ["//", !GetAtt EksCluster.OpenIdConnectIssuerUrl]]
      Policies:
        - PolicyName: evaluator-data-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DdbReadWrite
                Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:BatchGetItem
                Resource:
                  - !GetAtt TracesTable.Arn
                  - !Sub "${TracesTable.Arn}/index/*"
                  - !GetAtt ViolationsTable.Arn
                  - !Sub "${ViolationsTable.Arn}/index/*"
                  - !GetAtt AgentStatsTable.Arn
                  - !Sub "${AgentStatsTable.Arn}/index/*"
                  - !GetAtt PolicyRulesTable.Arn
              - Sid: KmsDecrypt
                Effect: Allow
                Action: kms:Decrypt
                Resource: !If [ CreateKmsKey, !GetAtt SubstrateKmsKey.Arn, !Ref ExistingKmsKeyArn ]
      Tags:
        - { Key: gentrail:service-account, Value: evaluator }

  # ── Authproxy IRSA role (k8s ingest, replaces the authproxy Lambda) ──
  AuthproxyIrsaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument: !Sub
        - |
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": { "Federated": "${OidcArn}" },
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "${OidcUrl}:sub": "system:serviceaccount:gentrail:authproxy",
                  "${OidcUrl}:aud": "sts.amazonaws.com"
                }
              }
            }]
          }
        - OidcArn: !GetAtt EksOidcProvider.Arn
          OidcUrl: !Select [1, !Split ["//", !GetAtt EksCluster.OpenIdConnectIssuerUrl]]
      Policies:
        - PolicyName: authproxy-data-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DdbReadWrite
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt TracesTable.Arn
                  - !Sub "${TracesTable.Arn}/index/*"
                  - !GetAtt AgentStatsTable.Arn
                  - !Sub "${AgentStatsTable.Arn}/index/*"
                  - !GetAtt ApiKeysTable.Arn
              - Sid: KmsDecrypt
                Effect: Allow
                Action: kms:Decrypt
                Resource: !If [ CreateKmsKey, !GetAtt SubstrateKmsKey.Arn, !Ref ExistingKmsKeyArn ]
      Tags:
        - { Key: gentrail:service-account, Value: authproxy }

  # ── ACM cert (conditional) ──────────────────────────────────────
  # Note: the ALB is created by the AWS Load Balancer Controller from the Ingress
  # in the Helm chart - NOT here. For HTTPS, pass ExistingAcmCertArn (a BYO ACM
  # cert); point your own DNS at the ALB post-install (a one-line aws CLI command
  # in the runbook). CFN manages no Route 53 zones, records, or certs.

  # ── Trace archiver (DDB stream → S3, parity with infra/ingestion) ─
  ArchiverRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-trace-archiver"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: dynamodb-streams
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:DescribeStream
                  - dynamodb:ListStreams
                Resource: !Sub "${TracesTable.Arn}/stream/*"
        - PolicyName: s3-archive-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub "${TraceArchiveBucket.Arn}/*"
        # Unlike Gentrail cloud (AWS-owned table keys), the substrate tables
        # and buckets are CMK-encrypted: reading the stream needs Decrypt,
        # writing SSE-KMS archive objects needs GenerateDataKey.
        - PolicyName: kms-substrate
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !If [ CreateKmsKey, !GetAtt SubstrateKmsKey.Arn, !Ref ExistingKmsKeyArn ]

  ArchiverFn:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ClusterName}-trace-archiver"
      Runtime: provided.al2023
      Architectures: [ arm64 ]
      Handler: bootstrap
      MemorySize: 128
      Timeout: 60
      Role: !GetAtt ArchiverRole.Arn
      Code:
        S3Bucket: !Ref ArchiverCodeS3Bucket
        S3Key: !Ref ArchiverCodeS3Key
      Environment:
        Variables:
          ARCHIVE_BUCKET: !Ref TraceArchiveBucket
      Tags:
        - { Key: gentrail:role, Value: trace-archiver }

  ArchiverStreamMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt TracesTable.StreamArn
      FunctionName: !GetAtt ArchiverFn.Arn
      StartingPosition: LATEST
      BatchSize: 100
      MaximumBatchingWindowInSeconds: 30
      FilterCriteria:
        Filters:
          - Pattern: '{"eventName":["REMOVE"]}'

  # ── Bedrock-model validator ──────────────────────────────────────
  BedrockValidatorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: bedrock-list-models
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:ListFoundationModels
                  - bedrock:ListInferenceProfiles
                Resource: "*"

  BedrockValidatorFn:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ClusterName}-bedrock-validator"
      Runtime: python3.12
      # Inline ZipFile lands as `index.py` in the Lambda env — Handler must
      # be `index.handler`, NOT `handler.handler`. The standalone handler.py
      # file in deploy/m3/cfn/lambda/bedrock-validator/ is for future cfn-package
      # builds; keep both in sync but only `index.handler` works for inline ZipFile.
      Handler: index.handler
      Role: !GetAtt BedrockValidatorRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json, urllib.request, boto3
          def _r(e, c, s, r):
              b = json.dumps({"Status": s, "Reason": r, "PhysicalResourceId": e.get("PhysicalResourceId") or c.log_stream_name, "StackId": e["StackId"], "RequestId": e["RequestId"], "LogicalResourceId": e["LogicalResourceId"], "Data": {}}).encode()
              urllib.request.urlopen(urllib.request.Request(e["ResponseURL"], data=b, method="PUT", headers={"Content-Type": "", "Content-Length": str(len(b))})).read()
          def handler(e, c):
              if e["RequestType"] == "Delete":
                  return _r(e, c, "SUCCESS", "delete-noop")
              m, r = e["ResourceProperties"]["BedrockModelId"], e["ResourceProperties"]["Region"]
              # A region prefix (us./eu./apac.) marks a cross-region inference
              # profile, which lives in a different API than foundation models.
              is_profile = m.split(".", 1)[0] in ("us", "eu", "apac")
              # Advisory only: a model-access gap must not block substrate
              # provisioning. The policy engine is the sole Bedrock consumer and is
              # enabled separately, so surface a WARNING in the stack events (visible
              # on the CustomResource) instead of FAILING the whole stack.
              try:
                  bc = boto3.client("bedrock", region_name=r)
                  if is_profile:
                      ids = {p["inferenceProfileId"] for p in bc.list_inference_profiles()["inferenceProfileSummaries"]}
                  else:
                      ids = {x["modelId"] for x in bc.list_foundation_models()["modelSummaries"]}
              except Exception as ex:
                  return _r(e, c, "SUCCESS", f"WARNING: could not verify Bedrock access in {r} ({ex}); enable model access before using the policy engine")
              if m not in ids:
                  kind = "inference profile" if is_profile else "model"
                  return _r(e, c, "SUCCESS", f"WARNING: Bedrock {kind} {m!r} not available in {r}; enable model access before using the policy engine. First 5: {sorted(ids)[:5]}")
              _r(e, c, "SUCCESS", f"model {m} available in {r}")

  BedrockModelValidation:
    Type: Custom::BedrockModelValidator
    Properties:
      ServiceToken: !GetAtt BedrockValidatorFn.Arn
      BedrockModelId: !Ref BedrockModelId
      Region: !Ref AWS::Region

Outputs:
  ClusterName:
    Description: EKS cluster name (used by aws eks update-kubeconfig)
    Value: !Ref EksCluster
    Export: { Name: !Sub "${AWS::StackName}-ClusterName" }
  ClusterEndpoint:
    Value: !GetAtt EksCluster.Endpoint
  OidcIssuerUrl:
    Description: EKS OIDC issuer URL (for IRSA)
    Value: !GetAtt EksCluster.OpenIdConnectIssuerUrl

  VpcId:
    Value: !Ref Vpc
  PrivateSubnetIds:
    Description: Comma-separated private subnet IDs
    Value: !Join
      - ","
      - - !Ref PrivateSubnet0
        - !Ref PrivateSubnet1
        - !If [ ThreeOrMoreAzs, !Ref PrivateSubnet2, "" ]
  PublicSubnetIds:
    Description: Comma-separated public subnet IDs
    Value: !Join
      - ","
      - - !Ref PublicSubnet0
        - !Ref PublicSubnet1
        - !If [ ThreeOrMoreAzs, !Ref PublicSubnet2, "" ]

  KmsKeyArn:
    Description: Substrate KMS key ARN (Helm value -> kms.keyArn)
    Value: !If [ CreateKmsKey, !GetAtt SubstrateKmsKey.Arn, !Ref ExistingKmsKeyArn ]

  TraceArchiveBucketName:
    Description: Cold-tier bucket where TTL-expired traces are archived
    Value: !Ref TraceArchiveBucket

  RdsEndpoint:
    Description: RDS Postgres endpoint:port (Helm value -> rds.endpoint)
    Value: !Sub "${RdsInstance.Endpoint.Address}:${RdsInstance.Endpoint.Port}"
  RdsSecretArn:
    Description: Secrets Manager secret holding the RDS master password
    Value: !Ref RdsMasterSecret

  EvidenceBucketName:
    Description: S3 bucket holding compliance evidence (Helm value -> s3.evidenceBucket)
    Value: !Ref EvidenceBucket
  AlbLogsBucketName:
    Condition: EnableAlbAccessLogsCond
    Value: !Ref AlbLogsBucket
  VpcFlowLogsBucketName:
    Condition: EnableVpcFlowLogsCond
    Value: !Ref VpcFlowLogsBucket

  DdbTablePrefix:
    Value: !Ref DdbTableNamePrefix

  AcmCertArn:
    Description: ACM cert ARN for the public ALB(s); empty for HTTP (BYO)
    Value: !Ref ExistingAcmCertArn

  Hostname:
    Value: !Ref Hostname

  OtelHostname:
    Value: !Ref OtelHostname

  BedrockModelId:
    Value: !Ref BedrockModelId

  # IRSA role ARNs (Helm chart annotations)
  DashboardIrsaRoleArn:    { Value: !GetAtt DashboardIrsaRole.Arn }
  PolicyEngineIrsaRoleArn: { Value: !GetAtt PolicyEngineIrsaRole.Arn }
  EvaluatorIrsaRoleArn:    { Value: !GetAtt EvaluatorIrsaRole.Arn }
  AuthproxyIrsaRoleArn:    { Value: !GetAtt AuthproxyIrsaRole.Arn }
  AlbControllerIrsaRoleArn: { Value: !GetAtt AlbControllerIrsaRole.Arn }
  RdsBootstrapIrsaRoleArn: { Value: !GetAtt RdsBootstrapIrsaRole.Arn }

  GentrailReadOnlyRoleArn:
    Description: Read-only scanner role the dashboard assumes to scan this account; for the cross-account vendor path, email this + your ExternalId to support@gentrail.ai
    Value: !GetAtt GentrailReadOnlyRole.Arn
