AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Gentrail M3 BYOC substrate — VPC, EKS, RDS, S3, KMS, DDB, IRSA, ACM.
  Single template per SP2 spec decision. Resources currently empty;
  filled in incrementally across SP2 tasks 3–11.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: "Network" }
        Parameters:
          - VpcCidr
          - AzCount
          - AllowedIngressCidr
          - EnableVpcEndpoints
          - EnableVpcFlowLogs
      - Label: { default: "EKS" }
        Parameters:
          - ClusterName
          - EksVersion
          - NodeInstanceType
          - NodeCountMin
          - NodeCountDesired
          - NodeCountMax
          - EksLogTypes
      - Label: { default: "Encryption (P3)" }
        Parameters:
          - ExistingKmsKeyArn
          - KmsKeyAlias
          - S3ObjectLockRetentionDays
      - Label: { default: "DynamoDB" }
        Parameters:
          - DdbBillingMode
          - DdbEnablePointInTimeRecovery
          - DdbTableNamePrefix
      - Label: { default: "Trace archiving" }
        Parameters:
          - ArchiverCodeS3Bucket
          - ArchiverCodeS3Key
      - Label: { default: "RDS" }
        Parameters:
          - RdsInstanceClass
          - RdsAllocatedStorageGb
          - RdsBackupRetentionDays
          - RdsMultiAz
          - RdsEnabledCloudwatchLogsExports
      - Label: { default: "Ingress / TLS (P3)" }
        Parameters:
          - Hostname
          - OtelHostname
          - ExistingAcmCertArn
          - EnableAlbAccessLogs
          - TlsPolicy
      - Label: { default: "LLM" }
        Parameters:
          - BedrockModelId
          - BedrockFoundationModelId
      - Label: { default: "Observability" }
        Parameters:
          - CloudWatchLogsRetentionDays
      - Label: { default: "Cross-account (P4)" }
        Parameters:
          - VendorAccountId
          - ExternalId

Parameters:
  # ── Network ────────────────────────────────────────────────────────────
  VpcCidr:
    Type: String
    Default: "10.0.0.0/16"
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/(1[6-9]|2[0-8])$"
  AzCount:
    Type: Number
    Default: 3
    MinValue: 2
    MaxValue: 6
  AllowedIngressCidr:
    Type: String
    Default: "0.0.0.0/0"
    Description: CIDR allowed to reach the ALB on 443. Narrow post-install.
  EnableVpcEndpoints:
    Type: String
    AllowedValues: [ "true", "false" ]
    Default: "true"
  EnableVpcFlowLogs:
    Type: String
    AllowedValues: [ "true", "false" ]
    Default: "true"

  # ── EKS ────────────────────────────────────────────────────────────────
  ClusterName:
    Type: String
    Default: gentrail
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9-]{0,99}$"
  EksVersion:
    Type: String
    Default: "1.32"
    AllowedPattern: "^[0-9]+\\.[0-9]+$"
  NodeInstanceType:
    Type: String
    Default: t3.medium
  NodeCountMin:
    Type: Number
    Default: 2
    MinValue: 1
  NodeCountDesired:
    Type: Number
    Default: 2
    MinValue: 1
  NodeCountMax:
    Type: Number
    Default: 6
    MinValue: 1
  EksLogTypes:
    Type: CommaDelimitedList
    Default: "audit,authenticator,api"

  # ── Encryption (P3) ────────────────────────────────────────────────────
  ExistingKmsKeyArn:
    Type: String
    Default: ""
    Description: >
      Empty = CFN creates a new CMK with rotation. Non-empty = BYOK: use
      the given key as the substrate KEK. Customer holds key control either
      way; vendor never has kms:Decrypt.
  KmsKeyAlias:
    Type: String
    Default: "alias/gentrail-substrate"
  S3ObjectLockRetentionDays:
    Type: Number
    Default: 2555
    MinValue: 1
    MaxValue: 36500

  # ── DynamoDB ───────────────────────────────────────────────────────────
  DdbBillingMode:
    Type: String
    AllowedValues: [ "PAY_PER_REQUEST", "PROVISIONED" ]
    Default: "PAY_PER_REQUEST"
  DdbEnablePointInTimeRecovery:
    Type: String
    AllowedValues: [ "true", "false" ]
    Default: "true"
  DdbTableNamePrefix:
    Type: String
    Default: gentrail
    AllowedPattern: "^[a-z][a-z0-9-]{0,30}$"

  # ── Trace archiving ────────────────────────────────────────────────────
  ArchiverCodeS3Bucket:
    Type: String
    MinLength: 1
    Description: >
      S3 bucket in this stack's region holding the trace-archiver Lambda zip.
      install.sh stages the bundled archiver.zip there before create-stack. The
      archiver copies TTL-expired traces to the trace-archive bucket (GLACIER
      tiering), matching Gentrail cloud's retention behavior.
  ArchiverCodeS3Key:
    Type: String
    Default: "gentrail/archiver.zip"

  # ── RDS ────────────────────────────────────────────────────────────────
  RdsInstanceClass:
    Type: String
    Default: db.t3.medium
  RdsAllocatedStorageGb:
    Type: Number
    Default: 100
    MinValue: 20
    MaxValue: 16000
  RdsBackupRetentionDays:
    Type: Number
    Default: 35
    MinValue: 0
    MaxValue: 35
  RdsMultiAz:
    Type: String
    AllowedValues: [ "true", "false" ]
    Default: "true"
  RdsEnabledCloudwatchLogsExports:
    Type: CommaDelimitedList
    Default: "postgresql"
  EnableRdsPerformanceInsights:
    Type: String
    AllowedValues: [ "true", "false" ]
    Default: "true"
    Description: Performance Insights requires db.t3.medium+. Set false on smaller instances.
  RdsDeletionProtection:
    Type: String
    AllowedValues: [ "true", "false" ]
    Default: "true"
    Description: >
      Production default is true. Set false for sandbox/test installs so failed
      deploys can roll back cleanly — DeletionProtection=true blocks CFN from
      deleting the RDS instance during rollback, wedging the stack.

  # ── Ingress / TLS (P3) ─────────────────────────────────────────────────
  Hostname:
    Type: String
    Default: ""
    Description: Optional FQDN for the dashboard ALB (public installs). Empty (default) = internal install; clients use the ALB DNS name or DNS you point yourself.
  OtelHostname:
    Type: String
    Default: ""
    Description: Optional FQDN for the OTLP ingest ALB (e.g. otel.acme.com). Empty disables the authproxy ingress.
  ExistingAcmCertArn:
    Type: String
    Default: ""
    Description: Optional ACM cert ARN for HTTPS on the public ALB(s). Empty = HTTP (fine for a VPC-internal endpoint).
  EnableAlbAccessLogs:
    Type: String
    AllowedValues: [ "true", "false" ]
    Default: "true"
  TlsPolicy:
    Type: String
    Default: "ELBSecurityPolicy-TLS13-1-3-2021-06"

  # ── LLM ────────────────────────────────────────────────────────────────
  BedrockModelId:
    Type: String
    Default: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
    Description: >
      Bedrock model the policy engine invokes. Claude 4 is reachable only via a
      cross-region inference profile (the us./eu./apac. prefix), which is what
      this default is. A CustomResource checks it at stack-create and WARNS
      (advisory, non-blocking) if it is not yet enabled in this account/region.
      Enable model access before using the policy engine.

  BedrockFoundationModelId:
    Type: String
    Default: "anthropic.claude-sonnet-4-5-20250929-v1:0"
    Description: >
      The foundation model behind BedrockModelId (strip the region prefix). Used
      only to scope the policy engine's bedrock:InvokeModel IAM to the models the
      inference profile routes to. Keep in step with BedrockModelId.

  # ── Observability ──────────────────────────────────────────────────────
  CloudWatchLogsRetentionDays:
    Type: Number
    Default: 30
    AllowedValues: [ 1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653 ]

  # ── Cross-account (P4) ─────────────────────────────────────────────────
  VendorAccountId:
    Type: String
    Default: ""
    AllowedPattern: "^$|^[0-9]{12}$"
    Description: >-
      Vendor AWS account for the optional cross-account security scan (a paid
      feature). Leave empty on the free tier; supply it together with ExternalId
      to enable the scanner. No default, so a stock deploy never trusts a third
      party.
  ExternalId:
    Type: String
    NoEcho: true
    Default: ""
    Description: >-
      Cross-account external ID for the optional AWS security scan (a paid
      feature). Leave empty on the free tier: the cross-account scanner role is
      then not created and nothing reaches into this account.

Mappings:
  # AZ index → letter suffix. Used to name subnets predictably.
  AzIndexToSuffix:
    "0": { Suffix: "a" }
    "1": { Suffix: "b" }
    "2": { Suffix: "c" }
    "3": { Suffix: "d" }
    "4": { Suffix: "e" }
    "5": { Suffix: "f" }

Conditions:
  # The cross-account security scanner is a paid feature, created only when BOTH
  # an ExternalId and a VendorAccountId are supplied, so the trust never renders
  # against an empty or defaulted account. Free-tier installs leave both empty.
  EnableScanner: !And
    - !Not [ !Equals [ !Ref ExternalId, "" ] ]
    - !Not [ !Equals [ !Ref VendorAccountId, "" ] ]
  CreateKmsKey: !Equals [ !Ref ExistingKmsKeyArn, "" ]
  EnableVpcEndpointsCond: !Equals [ !Ref EnableVpcEndpoints, "true" ]
  EnableVpcFlowLogsCond: !Equals [ !Ref EnableVpcFlowLogs, "true" ]
  EnableRdsPerformanceInsightsCond: !Equals [ !Ref EnableRdsPerformanceInsights, "true" ]
  EnableAlbAccessLogsCond: !Equals [ !Ref EnableAlbAccessLogs, "true" ]
  ThreeOrMoreAzs: !Not [ !Equals [ !Ref AzCount, 2 ] ]
  FourOrMoreAzs: !Or [ !Equals [ !Ref AzCount, 4 ], !Equals [ !Ref AzCount, 5 ], !Equals [ !Ref AzCount, 6 ] ]
  FiveOrMoreAzs: !Or [ !Equals [ !Ref AzCount, 5 ], !Equals [ !Ref AzCount, 6 ] ]
  SixAzs: !Equals [ !Ref AzCount, 6 ]

Resources:
  # ── VPC ──────────────────────────────────────────────────────────────
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-vpc" }
        - { Key: !Sub "kubernetes.io/cluster/${ClusterName}", Value: shared }

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-igw" }
  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  # ── Public subnets (one per AZ, /20 each) ───────────────────────────
  # CIDR slicing: VpcCidr=10.0.0.0/16 → public 10.0.0.0/20, 10.0.16.0/20, …
  PublicSubnet0:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [ 0, !Cidr [ !Ref VpcCidr, 6, 12 ] ]
      AvailabilityZone: !Select [ 0, !GetAZs "" ]
      MapPublicIpOnLaunch: true
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-public-a" }
        - { Key: "kubernetes.io/role/elb", Value: "1" }
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [ 1, !Cidr [ !Ref VpcCidr, 6, 12 ] ]
      AvailabilityZone: !Select [ 1, !GetAZs "" ]
      MapPublicIpOnLaunch: true
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-public-b" }
        - { Key: "kubernetes.io/role/elb", Value: "1" }
  PublicSubnet2:
    Condition: ThreeOrMoreAzs
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [ 2, !Cidr [ !Ref VpcCidr, 6, 12 ] ]
      AvailabilityZone: !Select [ 2, !GetAZs "" ]
      MapPublicIpOnLaunch: true
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-public-c" }
        - { Key: "kubernetes.io/role/elb", Value: "1" }

  # ── Private subnets (one per AZ, /20 each, offset by 3) ─────────────
  PrivateSubnet0:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [ 3, !Cidr [ !Ref VpcCidr, 6, 12 ] ]
      AvailabilityZone: !Select [ 0, !GetAZs "" ]
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-private-a" }
        - { Key: "kubernetes.io/role/internal-elb", Value: "1" }
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [ 4, !Cidr [ !Ref VpcCidr, 6, 12 ] ]
      AvailabilityZone: !Select [ 1, !GetAZs "" ]
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-private-b" }
        - { Key: "kubernetes.io/role/internal-elb", Value: "1" }
  PrivateSubnet2:
    Condition: ThreeOrMoreAzs
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [ 5, !Cidr [ !Ref VpcCidr, 6, 12 ] ]
      AvailabilityZone: !Select [ 2, !GetAZs "" ]
      Tags:
        - { Key: Name, Value: !Sub "${ClusterName}-private-c" }
        - { Key: "kubernetes.io/role/internal-elb", Value: "1" }

  # ── NAT gateways (one per public AZ; high cost but matches AWS best-practice)
  NatEip0:
    Type: AWS::EC2::EIP
    DependsOn: IgwAttach
    Properties:
      Domain: vpc
      Tags: [ { Key: Name, Value: !Sub "${ClusterName}-nat-a" } ]
  NatGateway0:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip0.AllocationId
      SubnetId: !Ref PublicSubnet0
      Tags: [ { Key: Name, Value: !Sub "${ClusterName}-nat-a" } ]
  NatEip1:
    Type: AWS::EC2::EIP
    DependsOn: IgwAttach
    Properties:
      Domain: vpc
      Tags: [ { Key: Name, Value: !Sub "${ClusterName}-nat-b" } ]
  NatGateway1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip1.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags: [ { Key: Name, Value: !Sub "${ClusterName}-nat-b" } ]
  NatEip2:
    Condition: ThreeOrMoreAzs
    Type: AWS::EC2::EIP
    DependsOn: IgwAttach
    Properties:
      Domain: vpc
      Tags: [ { Key: Name, Value: !Sub "${ClusterName}-nat-c" } ]
  NatGateway2:
    Condition: ThreeOrMoreAzs
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip2.AllocationId
      SubnetId: !Ref PublicSubnet2
      Tags: [ { Key: Name, Value: !Sub "${ClusterName}-nat-c" } ]

  # ── Route tables ──────────────────────────────────────────────────
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags: [ { Key: Name, Value: !Sub "${ClusterName}-public-rt" } ]
  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway
  PublicSubnet0Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnet0, RouteTableId: !Ref PublicRouteTable }
  PublicSubnet1Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnet1, RouteTableId: !Ref PublicRouteTable }
  PublicSubnet2Assoc:
    Condition: ThreeOrMoreAzs
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnet2, RouteTableId: !Ref PublicRouteTable }

  # One private route table per AZ → its own NAT gateway
  PrivateRouteTable0:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags: [ { Key: Name, Value: !Sub "${ClusterName}-private-rt-a" } ]
  PrivateDefaultRoute0:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable0
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref NatGateway0
  PrivateSubnet0Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateSubnet0, RouteTableId: !Ref PrivateRouteTable0 }

  PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags: [ { Key: Name, Value: !Sub "${ClusterName}-private-rt-b" } ]
  PrivateDefaultRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref NatGateway1
  PrivateSubnet1Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateSubnet1, RouteTableId: !Ref PrivateRouteTable1 }

  PrivateRouteTable2:
    Condition: ThreeOrMoreAzs
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags: [ { Key: Name, Value: !Sub "${ClusterName}-private-rt-c" } ]
  PrivateDefaultRoute2:
    Condition: ThreeOrMoreAzs
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable2
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref NatGateway2
  PrivateSubnet2Assoc:
    Condition: ThreeOrMoreAzs
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateSubnet2, RouteTableId: !Ref PrivateRouteTable2 }

  # ── Security groups (default-deny; tight ingress) ─────────────────
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: ALB ingress (443 only)
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref AllowedIngressCidr
      Tags: [ { Key: Name, Value: !Sub "${ClusterName}-alb-sg" } ]

  NodesSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: EKS nodes - accept only from ALB SG
      Tags: [ { Key: Name, Value: !Sub "${ClusterName}-nodes-sg" } ]
  NodesIngressFromAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodesSecurityGroup
      IpProtocol: tcp
      FromPort: 1024
      ToPort: 65535
      SourceSecurityGroupId: !Ref AlbSecurityGroup
  NodesIngressSelf:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodesSecurityGroup
      IpProtocol: "-1"
      SourceSecurityGroupId: !Ref NodesSecurityGroup

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: RDS - accept Postgres only from EKS nodes
      Tags: [ { Key: Name, Value: !Sub "${ClusterName}-rds-sg" } ]
  RdsIngressFromNodes:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RdsSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref NodesSecurityGroup
  # Pod ENIs created by the VPC CNI sit in the EKS-managed cluster security
  # group, NOT in NodesSecurityGroup. Without this rule, pods (including
  # the dashboard) can't reach RDS even though the node itself can.
  RdsIngressFromClusterSg:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RdsSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !GetAtt EksCluster.ClusterSecurityGroupId

  # ── VPC Flow Logs (optional; default on) ──────────────────────────
  FlowLogsLogGroup:
    Condition: EnableVpcFlowLogsCond
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/vpc/${ClusterName}-flow-logs"
      RetentionInDays: !Ref CloudWatchLogsRetentionDays
  FlowLogsRole:
    Condition: EnableVpcFlowLogsCond
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: vpc-flow-logs.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: WriteFlowLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: !GetAtt FlowLogsLogGroup.Arn
  VpcFlowLog:
    Condition: EnableVpcFlowLogsCond
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogsRole.Arn
      LogGroupName: !Ref FlowLogsLogGroup
      ResourceId: !Ref Vpc
      ResourceType: VPC
      TrafficType: ALL

  # ── VPC endpoints (optional; default on; cuts NAT cost) ──────────
  S3GatewayEndpoint:
    Condition: EnableVpcEndpointsCond
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable0
        - !Ref PrivateRouteTable1
        - !If [ ThreeOrMoreAzs, !Ref PrivateRouteTable2, !Ref AWS::NoValue ]
  DdbGatewayEndpoint:
    Condition: EnableVpcEndpointsCond
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.dynamodb"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable0
        - !Ref PrivateRouteTable1
        - !If [ ThreeOrMoreAzs, !Ref PrivateRouteTable2, !Ref AWS::NoValue ]

  EndpointSecurityGroup:
    Condition: EnableVpcEndpointsCond
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: Interface VPC endpoints - 443 from nodes
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref NodesSecurityGroup
  KmsInterfaceEndpoint:
    Condition: EnableVpcEndpointsCond
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.kms"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SecurityGroupIds: [ !Ref EndpointSecurityGroup ]
      SubnetIds:
        - !Ref PrivateSubnet0
        - !Ref PrivateSubnet1
        - !If [ ThreeOrMoreAzs, !Ref PrivateSubnet2, !Ref AWS::NoValue ]
  BedrockInterfaceEndpoint:
    Condition: EnableVpcEndpointsCond
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.bedrock-runtime"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SecurityGroupIds: [ !Ref EndpointSecurityGroup ]
      SubnetIds:
        - !Ref PrivateSubnet0
        - !Ref PrivateSubnet1
        - !If [ ThreeOrMoreAzs, !Ref PrivateSubnet2, !Ref AWS::NoValue ]

  # ── KMS substrate key (P3 KEK) ────────────────────────────────────
  SubstrateKmsKey:
    Condition: CreateKmsKey
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: !Sub "Gentrail substrate KEK - ${ClusterName}"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AccountAdmin
            Effect: Allow
            Principal: { AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root" }
            Action: kms:*
            Resource: "*"
          # EC2 autoscaling needs CreateGrant to encrypt EBS volumes on
          # EKS managed-node-group instances. Without this, the node
          # group fails with "Client.InvalidKMSKey.InvalidState" and the
          # cluster never gets workers.
          - Sid: AllowAutoscalingSLR
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-service-role/autoscaling.amazonaws.com/AWSServiceRoleForAutoScaling"
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: "*"
          - Sid: AllowAutoscalingSLRCreateGrant
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-service-role/autoscaling.amazonaws.com/AWSServiceRoleForAutoScaling"
            Action: kms:CreateGrant
            Resource: "*"
            Condition:
              Bool: { "kms:GrantIsForAWSResource": "true" }
      Tags:
        - { Key: gentrail:role, Value: substrate-kek }
  SubstrateKmsAlias:
    Condition: CreateKmsKey
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Ref KmsKeyAlias
      TargetKeyId: !Ref SubstrateKmsKey

  # ── Secrets Manager - RDS master password ────────────────────────
  RdsMasterSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ClusterName}/rds/master"
      Description: RDS Postgres master credentials
      GenerateSecretString:
        SecretStringTemplate: '{"username":"gentrail"}'
        GenerateStringKey: password
        PasswordLength: 32
        # Avoid all URL-special characters so postgres://user:pass@host/db
        # parses cleanly without URL-encoding the password. The chart's
        # rds-secret-job builds the DSN by string interpolation.
        ExcludeCharacters: '"@/\\:?#&=+%[]{}|`<>,;()*^!$ '
      KmsKeyId: !If [ CreateKmsKey, !GetAtt SubstrateKmsKey.Arn, !Ref ExistingKmsKeyArn ]
      Tags:
        - { Key: gentrail:role, Value: rds-master }

